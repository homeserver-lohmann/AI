# Read the documentation before using the `docker-compose.yml` file:
# https://docs.searxng.org/admin/installation-docker.html

name: searxng

services:
  core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: always
    ports:
      - ${SEARXNG_HOST:+${SEARXNG_HOST}:}${SEARXNG_PORT:-8080}:${SEARXNG_PORT:-8080}
    env_file: ./.env
    volumes:
      - ./core-config/:/etc/searxng/:Z
      - core-data:/var/cache/searxng/
    networks: [ OpenWebUI_net ]

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    volumes:
      - valkey-data:/data/
    networks: [ OpenWebUI_net ]

  playwright:
    container_name: playwright
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    command: npx -y playwright@1.58.0 run-server --port 3035 --host 0.0.0.0
    ports:
      - "3035:3035"
    restart: unless-stopped
    networks: [ OpenWebUI_net ]



volumes:
  core-data:
  valkey-data:

networks:
  OpenWebUI_net:
    external: true
